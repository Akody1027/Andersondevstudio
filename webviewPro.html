<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>AndersonDev Studio - Client Presentation</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --accent: #a855f7;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', -apple-system, sans-serif; 
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            overflow: hidden; /* Prevents double scrollbars */
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* Header Area */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 4vw; 
            background: rgba(5, 5, 5, 0.8); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border); 
            z-index: 100; 
            transition: margin-top 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        header.hidden {
            margin-top: -100px;
        }
           
        
        .logo { 
            font-size: 1.5rem; 
            font-weight: 900; 
            letter-spacing: -1px; 
            text-decoration: none; 
            color: #fff; 
        }
        
        .text-accent { color: var(--accent); }
        
        .btn-contact { 
            padding: 10px 24px; 
            background: transparent; 
            color: #fff; 
            text-decoration: none; 
            font-weight: 600; 
            border-radius: 50px; 
            border: 1px solid var(--accent); 
            transition: all 0.3s ease; 
        }
        
        .btn-contact:hover { 
            background: var(--accent); 
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); 
        }

        /* Viewing Container */
        main { 
            flex-grow: 1; 
            position: relative; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        /* Loading Spinner */
        .spinner-container { 
            position: absolute; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            transition: opacity 0.3s ease; 
            pointer-events: none; 
        }
        
        .spinner { 
            width: 50px; 
            height: 50px; 
            border: 4px solid rgba(168, 85, 247, 0.2); 
            border-top: 4px solid var(--accent); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        /* The Sandbox */
        iframe { 
            width: 100%; 
            height: 90vh; 
            border: none; 
            z-index: 20; 
            opacity: 0; 
            transition: opacity 0.5s ease; 
            background-color: #fff; /* Default web background to prevent transparency bleed */
        }
        
        iframe.loaded { opacity: 1; }
      
      


/* Faint Swipe Instructions */
        .swipe-instructions {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            color: rgba(255, 255, 255, 0.85);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 4px;
            pointer-events: none;
            display: flex;
            animation: idlePulse 2.5s infinite;
        }

        @keyframes idlePulse {
            0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.02); }
        }



        
        .swipe-instructions span {
            transition: color 0.1s ease, text-shadow 0.1s ease;
        }

        .swipe-instructions span.highlight {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }
     
      
      
      
      
     
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <a href="https://www.andersondev.studio" class="logo">Anderson<span class="text-accent">Dev</span>.studio</a>
        <a href="https://www.andersondev.studio" class="btn-contact">More Info</a>
    </header>

    <main>
        <!-- The purple accent spinner, hidden via JS once the iframe fully loads -->
        <div class="spinner-container" id="loadingSpinner">
            <div class="spinner"></div>
            <div style="color: var(--accent); font-weight: 600; letter-spacing: 1px; font-size: 0.85rem;">LOADING ARCHITECTURE...</div>
        </div>
        
        <!-- Sandboxed iframe protects the parent shell from the embedded site's scripts breaking layout -->
        <iframe id="presentationFrame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
      
      
      <div class="swipe-instructions" id="swipeText">
            <span>&lt;</span><span>&lt;</span><span>&nbsp;</span><span>S</span><span>W</span><span>I</span><span>P</span><span>E</span><span>&nbsp;</span><span>&gt;</span><span>&gt;</span>
        </div>

      

     
    </main>

    <script>
        /**
         * ========================================================
         * PLAYLIST CONFIGURATION
         * ========================================================
         * Instructions:
         * 1. Add the URLs or local file names of the HTML files you want to present below.
         * 2. Since your client HTML files are hosted in the exact same repository, 
         *    you only need to provide the file names (e.g., 'real-estate-demo.html').
         * 3. To add more sites to the rotation, simply remove the double slashes (//) 
         *    to uncomment the grayed-out lines, or copy the format to create new ones.
         * 4. Ensure the last item in the active array does NOT have a comma after it.
         */
        const clientPlaylist = [
            'BBQ4.html',
            'photo.html',
            'pet.html',
            'hsale.html',
            'best.html',
            'BBQ1.html',
            'ftruck.html',
            'yourcareer.html',
            'BBQ2.html',
            'me.html',
            'fit.html',
            'designer.html',
            'rental.html',
            'debuild.html',
            'marlin.html',
            'aiagent.html',
            'recharge.html',
            'rest.html',
        
            'con.html',
            'power.html',
            'create.html',
            // 'demo10.html'
        ];

        // Central Application State
        let currentIndex = 0;
        const iframe = document.getElementById('presentationFrame');
        const spinner = document.getElementById('loadingSpinner');
      
        let touchStartX = 0;
        let touchEndX = 0;
      
      
      
      const swipeSpans = document.querySelectorAll('#swipeText span');

        function updateSwipeHighlight(currentX) {
            const deltaX = currentX - touchStartX;
            const threshold = 50; 
            const maxSpans = swipeSpans.length;
            
            swipeSpans.forEach(span => span.classList.remove('highlight'));
            if (Math.abs(deltaX) < 5) return; 
            
            const progress = Math.min(Math.abs(deltaX) / threshold, 1);
            const spansToHighlight = Math.ceil(progress * maxSpans);
            
            if (deltaX < 0) { 
                for(let i = maxSpans - 1; i >= maxSpans - spansToHighlight; i--) {
                    if(swipeSpans[i]) swipeSpans[i].classList.add('highlight');
                }
            } else { 
                for(let i = 0; i < spansToHighlight; i++) {
                    if(swipeSpans[i]) swipeSpans[i].classList.add('highlight');
                }
            }
        }
        
        function resetSwipeHighlight() {
            swipeSpans.forEach(span => span.classList.remove('highlight'));
        }
      
      
      
      
      
      
      
        
        function handleSwipe() {
            const swipeThreshold = 50;
            if (touchEndX < touchStartX - swipeThreshold) {
                if (currentIndex < clientPlaylist.length - 1) loadSite(currentIndex + 1);
            }
            if (touchEndX > touchStartX + swipeThreshold) {
                if (currentIndex > 0) loadSite(currentIndex - 1);
            }
        }

        // Logic to swap the iframe source and handle visual transitions
        function loadSite(index) {
            // Failsafe bounds checking
            if (index < 0 || index >= clientPlaylist.length) return;
            
            currentIndex = index;
            
            // Re-engage the loading state UI
            iframe.classList.remove('loaded');
            spinner.style.opacity = '1';
            
            // Swap the iframe file source
            iframe.src = clientPlaylist[currentIndex];
          
     
        }

        // Listener that detects when the embedded HTML file has finished rendering
        
        iframe.addEventListener('load', () => {
            spinner.style.opacity = '0';
            iframe.classList.add('loaded');

            try {
                const embeddedWindow = iframe.contentWindow;
                let lastScrollY = embeddedWindow.scrollY;
              
              

                embeddedWindow.addEventListener('scroll', () => {
                    const currentScrollY = embeddedWindow.scrollY;
                    const header = document.querySelector('header');

                    if (currentScrollY > lastScrollY && currentScrollY > 50) {
                        header.classList.add('hidden');
                    } else {
                        header.classList.remove('hidden');
                    }
                    lastScrollY = currentScrollY;
                });
              
  
                embeddedWindow.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
                embeddedWindow.addEventListener('touchmove', e => updateSwipeHighlight(e.changedTouches[0].screenX));
                embeddedWindow.addEventListener('touchend', e => {
                    touchEndX = e.changedTouches[0].screenX;
                    resetSwipeHighlight();
                    handleSwipe();
                });
              
 
            } catch (e) {
                console.warn("Cross-origin restriction: Cannot track scrolling inside this external URL.");
            }
        });
        
 
        // Global Swipe Bindings

        window.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        window.addEventListener('touchmove', e => updateSwipeHighlight(e.changedTouches[0].screenX));
        window.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            resetSwipeHighlight();
            handleSwipe();
        });

        // Initialization Boot Sequence
        if (clientPlaylist.length > 0) {
            loadSite(0);
        } else {
            spinner.innerHTML = "<div style='color: white;'>Playlist Configuration is empty.</div>";
        }
    </script>
</body>
</html>
